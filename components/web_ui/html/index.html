<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Signal Deck · ESP32 Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070d12;
  --panel: rgba(13, 22, 30, 0.8);
  --panel-strong: rgba(11, 18, 24, 0.94);
  --line: rgba(144, 178, 203, 0.28);
  --line-soft: rgba(144, 178, 203, 0.14);
  --text: #e8f3fa;
  --text-dim: #97adb9;
  --accent-hot: #ff8a3d;
  --accent-cold: #34d5b6;
  --accent-alert: #ff4d4f;
  --accent-solar: #f6c54f;
  --radius: 18px;
  --radius-sm: 12px;
  --shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
  --font-display: "Bebas Neue", sans-serif;
  --font-body: "Noto Serif SC", serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  min-height: 100vh;
  font-family: var(--font-body);
  color: var(--text);
  background: radial-gradient(circle at 15% 10%, rgba(255, 138, 61, 0.18), transparent 36%),
              radial-gradient(circle at 85% 12%, rgba(52, 213, 182, 0.14), transparent 34%),
              linear-gradient(150deg, #070d12 0%, #0b141b 52%, #060b11 100%);
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.45;
  background-image: linear-gradient(var(--line-soft) 1px, transparent 1px),
                    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size: 32px 32px;
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(7, 13, 18, 0) 65%, rgba(7, 13, 18, 0.8) 100%);
  z-index: -1;
}

.dashboard {
  width: min(1240px, calc(100% - 28px));
  margin: 16px auto 28px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 14px;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(9px);
  animation: panelIn 0.6s ease both;
}

.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 35%);
  opacity: 0.35;
}

.panel h2 {
  font-family: var(--font-display);
  letter-spacing: 1.7px;
  font-size: 22px;
  color: var(--accent-solar);
  margin-bottom: 10px;
}

.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  padding: 14px 18px;
  background: var(--panel-strong);
}

.brand-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-mark {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: conic-gradient(from 35deg, var(--accent-solar), var(--accent-hot), var(--accent-cold), var(--accent-solar));
  box-shadow: 0 0 20px rgba(246, 197, 79, 0.35);
}

.brand-title {
  font-family: var(--font-display);
  font-size: 34px;
  letter-spacing: 2px;
  line-height: 0.92;
}

.brand-sub {
  color: var(--text-dim);
  font-size: 12px;
  letter-spacing: 1px;
}

.header-info {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.chip {
  border: 1px solid var(--line);
  background: rgba(12, 20, 27, 0.86);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
}

.chip strong {
  color: var(--text);
  font-weight: 600;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-cold);
  box-shadow: 0 0 10px var(--accent-cold);
}

.env {
  grid-column: span 7;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.metric {
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-sm);
  padding: 14px;
  background: rgba(10, 16, 21, 0.85);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.metric-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
}

.metric-name {
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

.metric-value {
  font-family: var(--font-display);
  font-size: 38px;
  line-height: 1;
  letter-spacing: 1px;
}

.metric-unit {
  font-size: 12px;
  color: var(--text-dim);
}

.track {
  width: 100%;
  height: 8px;
  border-radius: 999px;
  background: rgba(130, 157, 177, 0.18);
  overflow: hidden;
}

.fill {
  width: 0;
  height: 100%;
  border-radius: inherit;
  transition: width 0.35s ease;
}

.fill.temp { background: linear-gradient(90deg, #ffb43d, var(--accent-hot)); }
.fill.humi { background: linear-gradient(90deg, #22d3ae, var(--accent-cold)); }
.fill.light { background: linear-gradient(90deg, #f0d061, var(--accent-solar)); }
.fill.smoke { background: linear-gradient(90deg, #ff7b7b, var(--accent-alert)); }

.metric-tip {
  font-size: 12px;
  color: var(--text-dim);
}

.metric.smoke-metric {
  background:
    linear-gradient(145deg, rgba(53, 12, 13, 0.38), rgba(10, 16, 21, 0.92) 46%),
    rgba(10, 16, 21, 0.85);
  border-color: rgba(255, 77, 79, 0.22);
  box-shadow: inset 0 1px 0 rgba(255, 122, 123, 0.08);
}

.smoke-threshold-panel {
  margin-top: 4px;
  padding: 12px;
  border-radius: 14px;
  border: 1px solid rgba(255, 122, 123, 0.18);
  background: linear-gradient(180deg, rgba(255, 77, 79, 0.08), rgba(255, 77, 79, 0.02));
  display: grid;
  gap: 10px;
}

.smoke-threshold-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.smoke-threshold-label {
  color: #ffd7d7;
  letter-spacing: 1px;
}

.smoke-threshold-live {
  padding: 4px 9px;
  border-radius: 999px;
  border: 1px solid rgba(255, 122, 123, 0.2);
  background: rgba(8, 12, 16, 0.56);
  font-family: var(--font-display);
  font-size: 13px;
  letter-spacing: 1px;
  color: #ffe1e1;
}

.smoke-threshold-live[data-state="editing"] {
  color: #ffd272;
  border-color: rgba(246, 197, 79, 0.28);
}

.smoke-threshold-live[data-state="saving"] {
  color: #9bf2e3;
  border-color: rgba(52, 213, 182, 0.36);
}

.smoke-threshold-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
}

.smoke-threshold-input {
  min-width: 0;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(5, 9, 13, 0.66);
  padding: 9px 12px;
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 10px;
}

.smoke-threshold-input span {
  font-family: var(--font-display);
  letter-spacing: 1px;
  color: rgba(255, 224, 224, 0.86);
}

.smoke-threshold-input input {
  width: 100%;
  min-width: 0;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 1px;
}

.smoke-threshold-input input::-webkit-outer-spin-button,
.smoke-threshold-input input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.smoke-threshold-input input[type="number"] {
  -moz-appearance: textfield;
}

.smoke-threshold-btn,
.smoke-preset {
  border: 1px solid transparent;
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
}

.smoke-threshold-btn {
  padding: 0 16px;
  border-radius: 12px;
  background: linear-gradient(135deg, #ff9f68, #f6c54f);
  color: #2d1606;
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 1px;
  box-shadow: 0 10px 20px rgba(246, 197, 79, 0.18);
}

.smoke-threshold-btn:hover,
.smoke-preset:hover {
  transform: translateY(-1px);
}

.smoke-threshold-btn:disabled {
  opacity: 0.6;
  cursor: wait;
  transform: none;
}

.smoke-threshold-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.smoke-threshold-hint {
  color: rgba(255, 223, 223, 0.72);
}

.smoke-threshold-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.smoke-preset {
  padding: 5px 9px;
  border-radius: 999px;
  border-color: rgba(255, 255, 255, 0.08);
  background: rgba(8, 12, 16, 0.72);
  color: rgba(255, 237, 237, 0.88);
  font-size: 11px;
}

.smoke-preset.active {
  border-color: rgba(255, 122, 123, 0.42);
  box-shadow: 0 0 0 1px rgba(255, 77, 79, 0.16) inset;
  color: #fff4f4;
}

.controls {
  grid-column: span 5;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.control-card {
  border: 1px solid var(--line-soft);
  background: rgba(9, 16, 22, 0.9);
  border-radius: var(--radius-sm);
  padding: 13px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.control-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.control-title {
  font-size: 15px;
}

.control-state {
  font-size: 12px;
  color: var(--text-dim);
}

.toggle {
  border: 1px solid var(--line);
  border-radius: 999px;
  width: 56px;
  height: 32px;
  background: rgba(129, 149, 162, 0.3);
  position: relative;
  cursor: pointer;
  transition: all 0.25s ease;
}

.toggle::after {
  content: "";
  position: absolute;
  left: 4px;
  top: 4px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #eaf4ff;
  transition: transform 0.25s ease;
}

.toggle.on {
  background: rgba(52, 213, 182, 0.35);
  border-color: rgba(52, 213, 182, 0.65);
  box-shadow: 0 0 18px rgba(52, 213, 182, 0.22);
}

.toggle.on::after {
  transform: translateX(23px);
}

.range {
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 99px;
  background: rgba(130, 157, 177, 0.24);
}

.range::-webkit-slider-thumb {
  appearance: none;
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent-solar);
  box-shadow: 0 0 10px rgba(246, 197, 79, 0.7);
}

.range::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border: none;
  border-radius: 50%;
  background: var(--accent-solar);
}

.lower-grid {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 14px;
}

.rgb-zone {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.preset-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.preset {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.24);
  cursor: pointer;
  transition: transform 0.2s ease, border-color 0.2s ease;
}

.preset:hover,
.preset.active {
  transform: scale(1.12);
  border-color: #f8fcff;
}

.rgb-grid {
  display: grid;
  grid-template-columns: 132px 1fr;
  gap: 14px;
  align-items: center;
}

.preview {
  width: 132px;
  aspect-ratio: 1;
  border-radius: 16px;
  border: 1px solid var(--line);
  box-shadow: 0 0 26px rgba(52, 213, 182, 0.25);
  position: relative;
  overflow: hidden;
}

.preview::before {
  content: "RGB";
  position: absolute;
  inset: auto 10px 8px auto;
  font-family: var(--font-display);
  letter-spacing: 1px;
  color: rgba(10, 16, 22, 0.6);
  font-size: 26px;
}

.rgb-line {
  display: grid;
  grid-template-columns: 20px 1fr 42px;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.rgb-line span {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--text-dim);
}

.rgb-line output {
  text-align: right;
  font-size: 12px;
  color: var(--text-dim);
}

.side-stack {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.mode-badge {
  width: 128px;
  height: 128px;
  margin: 6px auto;
  border-radius: 50%;
  border: 2px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 34px;
  letter-spacing: 2px;
  transition: all 0.3s ease;
}

.mode-badge.auto {
  color: var(--accent-cold);
  box-shadow: 0 0 24px rgba(52, 213, 182, 0.24);
  border-color: rgba(52, 213, 182, 0.65);
}

.mode-badge.manual {
  color: var(--accent-hot);
  box-shadow: 0 0 24px rgba(255, 138, 61, 0.24);
  border-color: rgba(255, 138, 61, 0.65);
}

.btn {
  border: none;
  border-radius: 12px;
  background: linear-gradient(120deg, var(--accent-hot), var(--accent-solar));
  color: #221506;
  cursor: pointer;
  width: 100%;
  padding: 12px;
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 1px;
}

.toast-wrap {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 40;
  pointer-events: none;
}

.toast {
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(9, 16, 22, 0.95);
  font-size: 12px;
  color: var(--text);
  animation: toastIn 0.25s ease;
}

@keyframes panelIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 980px) {
  .env,
  .controls { grid-column: 1 / -1; }
  .lower-grid { grid-template-columns: 1fr; }
}

@media (max-width: 620px) {
  .dashboard { width: calc(100% - 18px); gap: 10px; }
  .panel { padding: 12px; border-radius: 14px; }
  .brand-title { font-size: 28px; }
  .env { grid-template-columns: 1fr; }
  .rgb-grid { grid-template-columns: 1fr; }
  .preview { width: 100%; max-width: 150px; }
  .smoke-threshold-row { grid-template-columns: 1fr; }
  .smoke-threshold-btn { min-height: 44px; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>
<div class="dashboard">
  <header class="panel header" style="animation-delay:.02s">
    <div class="brand-wrap">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-title">Signal Deck</div>
        <div class="brand-sub">ESP32 家居控制矩阵</div>
      </div>
    </div>
    <div class="header-info">
      <div class="chip"><span class="dot" id="netDot"></span><strong id="netText">ONLINE</strong></div>
      <div class="chip">轮询 <strong>2s</strong></div>
      <div class="chip" id="clock">--:--:--</div>
    </div>
  </header>

  <section class="panel env" style="animation-delay:.08s">
    <h2 style="grid-column:1/-1">环境总览</h2>

    <article class="metric">
      <div class="metric-head">
        <div class="metric-name">温度</div>
        <div class="metric-value"><span id="tempValue">--</span><span class="metric-unit">°C</span></div>
      </div>
      <div class="track"><div class="fill temp" id="tempFill"></div></div>
      <div class="metric-tip">舒适建议 18~26°C</div>
    </article>

    <article class="metric">
      <div class="metric-head">
        <div class="metric-name">湿度</div>
        <div class="metric-value"><span id="humiValue">--</span><span class="metric-unit">%</span></div>
      </div>
      <div class="track"><div class="fill humi" id="humiFill"></div></div>
      <div class="metric-tip">舒适建议 40~60%</div>
    </article>

    <article class="metric">
      <div class="metric-head">
        <div class="metric-name">光照</div>
        <div class="metric-value"><span id="lightValue">--</span><span class="metric-unit">Lux</span></div>
      </div>
      <div class="track"><div class="fill light" id="lightFill"></div></div>
      <div class="metric-tip">自动照明阈值 100 Lux</div>
    </article>

    <article class="metric smoke-metric">
      <div class="metric-head">
        <div class="metric-name">烟雾</div>
        <div class="metric-value"><span id="smokeValue">--</span><span class="metric-unit">ADC</span></div>
      </div>
      <div class="track"><div class="fill smoke" id="smokeFill"></div></div>
      <div class="metric-tip smoke-threshold-panel">
        <div class="smoke-threshold-top">
          <span class="smoke-threshold-label">报警阈值控制</span>
          <span id="smokeThreshLive" class="smoke-threshold-live" data-state="live">LIVE 3500</span>
        </div>
        <div class="smoke-threshold-row">
          <label class="smoke-threshold-input">
            <span>ADC</span>
            <input id="smokeThreshInput" type="number" min="100" max="4095" value="3500" inputmode="numeric">
          </label>
          <button id="smokeThreshBtn" class="smoke-threshold-btn" type="button">应用</button>
        </div>
        <div class="smoke-threshold-meta">
          <span id="smokeThreshHint" class="smoke-threshold-hint">范围 100 - 4095</span>
          <div class="smoke-threshold-presets">
            <button class="smoke-preset" type="button" data-threshold="2800">2800</button>
            <button class="smoke-preset" type="button" data-threshold="3500">3500</button>
            <button class="smoke-preset" type="button" data-threshold="3900">3900</button>
          </div>
        </div>
      </div>
    </article>
  </section>

  <section class="panel controls" style="animation-delay:.12s">
    <h2>设备控制</h2>

    <article class="control-card">
      <div class="control-row">
        <div>
          <div class="control-title">主照明</div>
          <div class="control-state" id="ledStateText">--</div>
        </div>
        <button id="ledToggle" class="toggle" type="button" aria-label="切换照明"></button>
      </div>
      <input id="ledRange" class="range" type="range" min="0" max="255" value="0">
    </article>

    <article class="control-card">
      <div class="control-row">
        <div>
          <div class="control-title">排风扇</div>
          <div class="control-state" id="fanStateText">--</div>
        </div>
        <button id="fanToggle" class="toggle" type="button" aria-label="切换风扇"></button>
      </div>
      <input id="fanRange" class="range" type="range" min="0" max="255" value="0">
    </article>

    <article class="control-card">
      <div class="control-row">
        <div>
          <div class="control-title">窗帘</div>
          <div class="control-state" id="curtainStateText">--</div>
        </div>
        <button id="curtainToggle" class="toggle" type="button" aria-label="切换窗帘"></button>
      </div>
    </article>
  </section>

  <section class="lower-grid">
    <section class="panel rgb-zone" style="animation-delay:.16s">
      <h2>RGB Studio</h2>
      <div class="preset-row" id="presetRow">
        <button class="preset" data-color="red" style="background:#ef4444" aria-label="红色"></button>
        <button class="preset" data-color="orange" style="background:#f97316" aria-label="橙色"></button>
        <button class="preset" data-color="yellow" style="background:#facc15" aria-label="黄色"></button>
        <button class="preset" data-color="green" style="background:#22c55e" aria-label="绿色"></button>
        <button class="preset" data-color="cyan" style="background:#06b6d4" aria-label="青色"></button>
        <button class="preset" data-color="blue" style="background:#3b82f6" aria-label="蓝色"></button>
        <button class="preset" data-color="magenta" style="background:#ec4899" aria-label="品红"></button>
        <button class="preset" data-color="white" style="background:#ffffff" aria-label="白色"></button>
      </div>

      <div class="rgb-grid">
        <div class="preview" id="rgbPreview" style="background: rgb(34, 197, 94);"></div>
        <div>
          <div class="rgb-line">
            <span style="color:#ef4444">R</span>
            <input id="rRange" class="range" type="range" min="0" max="255" value="34">
            <output id="rOut">34</output>
          </div>
          <div class="rgb-line">
            <span style="color:#22c55e">G</span>
            <input id="gRange" class="range" type="range" min="0" max="255" value="197">
            <output id="gOut">197</output>
          </div>
          <div class="rgb-line">
            <span style="color:#3b82f6">B</span>
            <input id="bRange" class="range" type="range" min="0" max="255" value="94">
            <output id="bOut">94</output>
          </div>
        </div>
      </div>
    </section>

    <section class="side-stack">
      <section class="panel" style="animation-delay:.2s">
        <h2>控制模式</h2>
        <div id="modeBadge" class="mode-badge auto">AUTO</div>
        <button id="modeToggle" class="btn" type="button">切换模式</button>
      </section>

    </section>
  </section>
</div>

<div id="toastWrap" class="toast-wrap"></div>

<script>
const state = {
  data: {},
  rgb: { r: 34, g: 197, b: 94 },
  rgbTimer: null,
  online: true,
  smokeDraft: null,
  smokeDirty: false,
  smokeSaving: false,
};

const el = {
  netDot: document.getElementById("netDot"),
  netText: document.getElementById("netText"),
  clock: document.getElementById("clock"),
  tempValue: document.getElementById("tempValue"),
  humiValue: document.getElementById("humiValue"),
  lightValue: document.getElementById("lightValue"),
  smokeValue: document.getElementById("smokeValue"),
  tempFill: document.getElementById("tempFill"),
  humiFill: document.getElementById("humiFill"),
  lightFill: document.getElementById("lightFill"),
  smokeFill: document.getElementById("smokeFill"),
  smokeThreshInput: document.getElementById("smokeThreshInput"),
  smokeThreshBtn: document.getElementById("smokeThreshBtn"),
  smokeThreshLive: document.getElementById("smokeThreshLive"),
  smokeThreshHint: document.getElementById("smokeThreshHint"),
  ledStateText: document.getElementById("ledStateText"),
  fanStateText: document.getElementById("fanStateText"),
  curtainStateText: document.getElementById("curtainStateText"),
  ledToggle: document.getElementById("ledToggle"),
  fanToggle: document.getElementById("fanToggle"),
  curtainToggle: document.getElementById("curtainToggle"),
  ledRange: document.getElementById("ledRange"),
  fanRange: document.getElementById("fanRange"),
  modeBadge: document.getElementById("modeBadge"),
  modeToggle: document.getElementById("modeToggle"),
  rRange: document.getElementById("rRange"),
  gRange: document.getElementById("gRange"),
  bRange: document.getElementById("bRange"),
  rOut: document.getElementById("rOut"),
  gOut: document.getElementById("gOut"),
  bOut: document.getElementById("bOut"),
  rgbPreview: document.getElementById("rgbPreview"),
  presetRow: document.getElementById("presetRow"),
  toastWrap: document.getElementById("toastWrap"),
  smokePresets: Array.from(document.querySelectorAll(".smoke-preset")),
};

const presetColorMap = {
  red: { r: 239, g: 68, b: 68 },
  orange: { r: 249, g: 115, b: 22 },
  yellow: { r: 250, g: 204, b: 21 },
  green: { r: 34, g: 197, b: 94 },
  cyan: { r: 6, g: 182, b: 212 },
  blue: { r: 59, g: 130, b: 246 },
  magenta: { r: 236, g: 72, b: 153 },
  white: { r: 255, g: 255, b: 255 },
};

function toast(text) {
  const item = document.createElement("div");
  item.className = "toast";
  item.textContent = text;
  el.toastWrap.appendChild(item);
  setTimeout(() => item.remove(), 2200);
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function setOnline(online) {
  state.online = online;
  el.netDot.style.background = online ? "var(--accent-cold)" : "var(--accent-alert)";
  el.netDot.style.boxShadow = online ? "0 0 10px var(--accent-cold)" : "0 0 10px var(--accent-alert)";
  el.netText.textContent = online ? "ONLINE" : "OFFLINE";
}

function formatNum(v, fixed) {
  const n = Number(v);
  if (!Number.isFinite(n)) return "--";
  return fixed != null ? n.toFixed(fixed) : String(n);
}

function setFill(node, value, max) {
  const n = Number(value);
  const ratio = Number.isFinite(n) ? clamp(n / max, 0, 1) : 0;
  node.style.width = `${Math.round(ratio * 100)}%`;
}

function setToggle(node, on) {
  node.classList.toggle("on", !!on);
}

function getSmokeThresholdSource() {
  const live = Number(state.data.smoke_threshold);
  if (Number.isFinite(live)) {
    return live;
  }
  return 3500;
}

function updateSmokeThresholdUi() {
  const liveValue = getSmokeThresholdSource();
  const draftText = state.smokeDraft == null ? "" : String(state.smokeDraft);
  const draftValue = Number(draftText);
  const hasDraft = draftText.trim() !== "" && Number.isFinite(draftValue);

  if (!state.smokeDirty && document.activeElement !== el.smokeThreshInput) {
    el.smokeThreshInput.value = liveValue;
  } else if (state.smokeDirty && document.activeElement !== el.smokeThreshInput) {
    el.smokeThreshInput.value = draftText;
  }

  el.smokeThreshBtn.disabled = state.smokeSaving;

  if (state.smokeSaving) {
    el.smokeThreshLive.dataset.state = "saving";
    el.smokeThreshLive.textContent = `SYNC ${liveValue}`;
    el.smokeThreshHint.textContent = "正在写入设备...";
  } else if (state.smokeDirty && hasDraft) {
    el.smokeThreshLive.dataset.state = "editing";
    el.smokeThreshLive.textContent = `EDIT ${draftValue}`;
    el.smokeThreshHint.textContent = `设备当前值 ${liveValue} · 按应用后生效`;
  } else if (state.smokeDirty) {
    el.smokeThreshLive.dataset.state = "editing";
    el.smokeThreshLive.textContent = "EDIT";
    el.smokeThreshHint.textContent = "请输入 100 - 4095 的整数";
  } else {
    el.smokeThreshLive.dataset.state = "live";
    el.smokeThreshLive.textContent = `LIVE ${liveValue}`;
    el.smokeThreshHint.textContent = "范围 100 - 4095";
  }

  el.smokePresets.forEach((node) => {
    const presetValue = Number(node.dataset.threshold);
    const activeValue = state.smokeDirty && hasDraft ? draftValue : liveValue;
    node.classList.toggle("active", presetValue === activeValue);
  });
}

function syncSmokeDraft(rawValue) {
  const liveValue = getSmokeThresholdSource();
  const draftText = String(rawValue ?? "");

  state.smokeDraft = draftText;
  state.smokeDirty = draftText.trim() !== String(liveValue);
  updateSmokeThresholdUi();
}

async function controlRequest(path) {
  try {
    const res = await fetch(path, {
      method: "POST",
    });

    if (!res.ok) {
      toast(`控制失败 (${res.status})`);
      return false;
    }

    await pollData();
    return true;
  } catch (err) {
    toast("网络异常，控制请求失败");
    return false;
  }
}

async function pollData() {
  try {
    const res = await fetch("/api/data", { cache: "no-store" });
    if (!res.ok) {
      setOnline(false);
      return;
    }

    const data = await res.json();
    state.data = data;
    render();
    setOnline(true);
  } catch (err) {
    setOnline(false);
  }
}

async function setSmokeThreshold() {
  const parsed = Number(el.smokeThreshInput.value);
  if (!Number.isFinite(parsed)) {
    toast("请输入有效阈值");
    return false;
  }

  const value = clamp(Math.round(parsed), 100, 4095);
  el.smokeThreshInput.value = value;
  state.smokeSaving = true;
  updateSmokeThresholdUi();

  try {
    const res = await fetch("/api/smoke/threshold", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ threshold: value }),
    });

    if (!res.ok) {
      let message = `设置失败 (${res.status})`;
      try {
        const data = await res.json();
        if (data && data.message) {
          message = data.message;
        }
      } catch (err) {}
      toast(message);
      state.smokeSaving = false;
      updateSmokeThresholdUi();
      return false;
    }

    state.data.smoke_threshold = value;
    state.smokeDraft = value;
    state.smokeDirty = false;
    toast(`烟雾阈值已更新为 ${value}`);
    await pollData();
    return true;
  } catch (err) {
    toast("网络异常，阈值设置失败");
    return false;
  } finally {
    state.smokeSaving = false;
    updateSmokeThresholdUi();
  }
}

function render() {
  const d = state.data;

  el.tempValue.textContent = formatNum(d.temperature, 1);
  el.humiValue.textContent = formatNum(d.humidity, 0);
  el.lightValue.textContent = formatNum(d.light, 0);
  el.smokeValue.textContent = formatNum(d.smoke, 0);

  setFill(el.tempFill, d.temperature, 50);
  setFill(el.humiFill, d.humidity, 100);
  setFill(el.lightFill, d.light, 1000);
  setFill(el.smokeFill, d.smoke, 4095);
  updateSmokeThresholdUi();

  const statusText = (v) => (v === 1 || v === true ? "已开启" : "已关闭");

  setToggle(el.ledToggle, d.led_state);
  setToggle(el.fanToggle, d.fan_state);
  setToggle(el.curtainToggle, d.curtain_state);

  el.ledStateText.textContent = `${statusText(d.led_state)} · 亮度 ${Number(d.led_brightness || 0)}`;
  el.fanStateText.textContent = `${statusText(d.fan_state)} · 转速 ${Number(d.fan_speed || 0)}`;
  el.curtainStateText.textContent = statusText(d.curtain_state);

  el.ledRange.value = Number(d.led_brightness || 0);
  el.fanRange.value = Number(d.fan_speed || 0);

  const mode = Number(d.control_mode);
  const auto = mode === 0;
  el.modeBadge.classList.toggle("auto", auto);
  el.modeBadge.classList.toggle("manual", !auto);
  el.modeBadge.textContent = auto ? "AUTO" : "MANUAL";
}

function renderRgb() {
  const { r, g, b } = state.rgb;
  el.rRange.value = r;
  el.gRange.value = g;
  el.bRange.value = b;
  el.rOut.textContent = r;
  el.gOut.textContent = g;
  el.bOut.textContent = b;
  el.rgbPreview.style.background = `rgb(${r}, ${g}, ${b})`;
}

function setActivePreset(color) {
  document.querySelectorAll(".preset").forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.color === color);
  });
}

function clearActivePreset() {
  document.querySelectorAll(".preset.active").forEach((btn) => btn.classList.remove("active"));
}

async function sendRgb() {
  const { r, g, b } = state.rgb;
  await controlRequest(`/api/rgb/color?r=${r}&g=${g}&b=${b}`);
}

function queueRgbSend() {
  clearTimeout(state.rgbTimer);
  state.rgbTimer = setTimeout(() => {
    sendRgb();
  }, 140);
}

function bindEvents() {
  el.smokeThreshBtn.addEventListener("click", setSmokeThreshold);

  el.smokeThreshInput.addEventListener("input", () => {
    syncSmokeDraft(el.smokeThreshInput.value);
  });

  el.smokeThreshInput.addEventListener("focus", () => {
    updateSmokeThresholdUi();
  });

  el.smokeThreshInput.addEventListener("blur", () => {
    if (!state.smokeDirty) {
      el.smokeThreshInput.value = getSmokeThresholdSource();
    }
    updateSmokeThresholdUi();
  });

  el.smokeThreshInput.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") {
      ev.preventDefault();
      setSmokeThreshold();
    }
  });

  el.smokePresets.forEach((node) => {
    node.addEventListener("click", () => {
      el.smokeThreshInput.value = node.dataset.threshold;
      syncSmokeDraft(node.dataset.threshold);
    });
  });

  el.ledToggle.addEventListener("click", async () => {
    const ok = await controlRequest("/api/led/toggle");
    if (ok) toast("照明已切换");
  });

  el.fanToggle.addEventListener("click", async () => {
    const ok = await controlRequest("/api/fan/toggle");
    if (ok) toast("风扇已切换");
  });

  el.curtainToggle.addEventListener("click", async () => {
    const ok = await controlRequest("/api/curtain/toggle");
    if (ok) toast("窗帘已切换");
  });

  el.modeToggle.addEventListener("click", async () => {
    const ok = await controlRequest("/api/mode/toggle");
    if (ok) toast("模式已切换");
  });

  el.ledRange.addEventListener("change", async () => {
    const value = clamp(Number(el.ledRange.value), 0, 255);
    const ok = await controlRequest(`/api/led/brightness?value=${value}`);
    if (ok) toast(`照明亮度 ${value}`);
  });

  el.fanRange.addEventListener("change", async () => {
    const value = clamp(Number(el.fanRange.value), 0, 255);
    const ok = await controlRequest(`/api/fan/speed?value=${value}`);
    if (ok) toast(`风扇转速 ${value}`);
  });

  [el.rRange, el.gRange, el.bRange].forEach((node) => {
    node.addEventListener("input", () => {
      state.rgb = {
        r: Number(el.rRange.value),
        g: Number(el.gRange.value),
        b: Number(el.bRange.value),
      };
      clearActivePreset();
      renderRgb();
      queueRgbSend();
    });
  });

  el.presetRow.addEventListener("click", async (ev) => {
    const target = ev.target.closest(".preset");
    if (!target) return;

    const color = target.dataset.color;
    const rgb = presetColorMap[color];
    if (!rgb) return;

    const ok = await controlRequest(`/api/rgb/preset?c=${color}`);
    if (!ok) return;

    state.rgb = { ...rgb };
    renderRgb();
    setActivePreset(color);
    toast(`RGB: ${color}`);
  });
}

function tickClock() {
  const now = new Date();
  el.clock.textContent = now.toLocaleTimeString("zh-CN", { hour12: false });
}

function init() {
  bindEvents();
  renderRgb();
  tickClock();
  setInterval(tickClock, 1000);
  pollData();
  setInterval(pollData, 2000);
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
